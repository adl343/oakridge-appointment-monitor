name: Check Oakridge appointments

on:
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Send a Telegram test message only"
        required: false
        default: false
        type: boolean
      send_status_message:
        description: "Send a Telegram status message even if closed"
        required: false
        default: false
        type: boolean
      mock_status:
        description: "Send a mock alert for testing"
        required: false
        default: "live"
        type: choice
        options:
          - live
          - available
          - unavailable
          - error
  schedule:
    # GitHub cron uses UTC. Start fewer, longer monitor windows at off-peak minutes.
    - cron: "17 5 * * *"
    - cron: "17 10 * * *"
    - cron: "17 15 * * *"
    # Daily summary after the last monitoring window.
    - cron: "25 20 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    permissions:
      contents: write
    concurrency:
      group: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.send_test_message == 'true' || github.event.inputs.mock_status != 'live') && format('oakridge-appointment-monitor-test-{0}', github.run_id) || 'oakridge-appointment-monitor-live' }}
      cancel-in-progress: false
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Check project setup
        run: npm ci --ignore-scripts

      - name: Check the website and send Telegram alert
        shell: bash
        run: |
          if [ "${SEND_TEST_MESSAGE}" = "true" ]; then
            npm run check
            exit 0
          fi

          if [ "${RUN_MODE}" = "monitor_loop" ]; then
            for check_number in $(seq 1 "${MONITOR_LOOP_CHECKS}"); do
              echo "Monitor check ${check_number}/${MONITOR_LOOP_CHECKS}"

              next_delay_minutes=0
              if [ "${check_number}" -lt "${MONITOR_LOOP_CHECKS}" ]; then
                next_delay_minutes="${CHECK_INTERVAL_MINUTES}"
              fi

              MONITOR_CHECK_NUMBER="${check_number}" \
              MONITOR_CHECK_TOTAL="${MONITOR_LOOP_CHECKS}" \
              NEXT_CHECK_DELAY_MINUTES="${next_delay_minutes}" \
              npm run check

              if [ "${check_number}" -lt "${MONITOR_LOOP_CHECKS}" ]; then
                sleep "${CHECK_INTERVAL_SECONDS}"
              fi
            done
          else
            npm run check
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TEST_MESSAGE: ${{ github.event.inputs.send_test_message || 'false' }}
          SEND_STATUS_MESSAGE: ${{ github.event.schedule == '25 20 * * *' || github.event.inputs.send_status_message == 'true' }}
          RUN_MODE: ${{ github.event_name == 'schedule' && github.event.schedule != '25 20 * * *' && 'monitor_loop' || 'single' }}
          RUN_TRIGGER: ${{ github.event_name == 'schedule' && github.event.schedule || github.event_name }}
          RUN_SLOT_LABEL: ${{ github.event_name == 'schedule' && github.event.schedule || 'manual' }}
          MONITOR_LOOP_CHECKS: "60"
          CHECK_INTERVAL_MINUTES: "5"
          CHECK_INTERVAL_SECONDS: "300"
          ALERT_EVERY_AVAILABLE: "true"
          AVAILABLE_ALERT_COOLDOWN_MINUTES: "0"
          MAX_AVAILABLE_ALERTS_PER_DAY: "999"
          ERROR_ALERT_COOLDOWN_MINUTES: "60"
          MAX_ERROR_ALERTS_PER_DAY: "3"
          MAX_LOG_LINES: "2000"
          FETCH_RETRY_COUNT: "1"
          FETCH_RETRY_DELAY_MS: "1500"
          MOCK_STATUS: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mock_status != 'live' && github.event.inputs.mock_status || '' }}"
          MOCK_ERROR: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mock_status == 'error' && 'GitHub Actions test: forced checker error.' || '' }}"
          STATE_PATH: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mock_status != 'live' && format('{0}/oakridge-test-status.json', runner.temp) || 'data/oakridge-status.json' }}"
          LOG_PATH: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mock_status != 'live' && format('{0}/oakridge-test-log.jsonl', runner.temp) || 'data/oakridge-check-log.jsonl' }}"
          PATTERN_PATH: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mock_status != 'live' && format('{0}/oakridge-test-pattern.json', runner.temp) || 'data/oakridge-pattern.json' }}"

      - name: Save pattern tracking data
        if: ${{ success() && github.event.inputs.send_test_message != 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.mock_status == 'live' || github.event.inputs.mock_status == '') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/oakridge-status.json
          if [ -f data/oakridge-check-log.jsonl ]; then
            git add data/oakridge-check-log.jsonl
          fi
          if [ -f data/oakridge-pattern.json ]; then
            git add data/oakridge-pattern.json
          fi
          if git diff --cached --quiet; then
            echo "No tracking data changes to save."
          else
            git commit -m "Update Oakridge appointment tracking data [skip ci]"
            git push
          fi
