name: Check Oakridge appointments

on:
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Send a Telegram test message only"
        required: false
        default: false
        type: boolean
      send_status_message:
        description: "Send a Telegram status message even if closed"
        required: false
        default: false
        type: boolean

  schedule:
    # Every 5 minutes, Monday to Friday, 6:00am to 10:55am UK time during British Summer Time.
    - cron: "*/5 5-9 * * 1-5"

    # One final check at 11:00am UK time during British Summer Time.
    - cron: "0 10 * * 1-5"

permissions:
  contents: write

concurrency:
  group: oakridge-appointment-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 7

    steps:
      - name: Get the files
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install the checker
        run: npm install

      - name: Install the browser
        run: npx playwright install --with-deps chromium

      - name: Check the website and send Telegram alert
        run: npm run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TEST_MESSAGE: ${{ github.event.inputs.send_test_message || 'false' }}
          SEND_STATUS_MESSAGE: ${{ github.event.inputs.send_status_message == 'true' }}

      - name: Save pattern tracking data
        if: ${{ success() && github.event.inputs.send_test_message != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main

          git add data/oakridge-status.json

          if git diff --cached --quiet; then
            echo "No tracking data changes to save."
            exit 0
          fi

          git commit -m "Update Oakridge appointment tracking data [skip ci]"
          git push origin HEAD:main
