name: Check Oakridge appointments

on:
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Send a Telegram test message only"
        required: false
        default: false
        type: boolean
      send_status_message:
        description: "Send a Telegram status message even if closed"
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub cron uses UTC. This checks every 5 minutes through the UK morning.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 5-11 * * 1-5"
    # Daily health summary after the morning monitoring window.
    - cron: "15 11 * * 1-5"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
    concurrency:
      group: oakridge-appointment-monitor
      cancel-in-progress: false
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Check project setup
        run: npm ci --ignore-scripts

      - name: Check the website and send Telegram alert
        run: npm run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TEST_MESSAGE: ${{ github.event.inputs.send_test_message || 'false' }}
          SEND_STATUS_MESSAGE: ${{ github.event.schedule == '15 11 * * 1-5' || github.event.inputs.send_status_message == 'true' }}
          ALERT_EVERY_AVAILABLE: "true"
          AVAILABLE_ALERT_COOLDOWN_MINUTES: "5"
          MAX_AVAILABLE_ALERTS_PER_DAY: "12"
          ERROR_ALERT_COOLDOWN_MINUTES: "60"
          MAX_ERROR_ALERTS_PER_DAY: "3"

      - name: Save pattern tracking data
        if: ${{ success() && github.event.inputs.send_test_message != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/oakridge-status.json
          if git diff --cached --quiet; then
            echo "No tracking data changes to save."
          else
            git commit -m "Update Oakridge appointment tracking data [skip ci]"
            git push
          fi
